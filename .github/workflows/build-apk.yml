name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  # Fast feedback: analyze + test on every PR and push. Doesn't need Rust
  # (the native Breez SDK only matters for the APK build), so this finishes
  # in ~2-3 minutes instead of 15.
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create test environment
        run: |
          printf '{"BREEZ_API_KEY":""}\n' > config.json

      - run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test

  # Full APK build — only on merge to main/master (not on PRs), since it
  # needs the Rust toolchain for the native Breez SDK and takes ~15 min.
  build:
    name: Build APK
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android
          rustup target add i686-linux-android

      - name: Create runtime environment
        env:
          BREEZ_API_KEY: ${{ secrets.BREEZ_API_KEY }}
        run: |
          if [ -z "$BREEZ_API_KEY" ]; then
            echo "::error::Configure the BREEZ_API_KEY repository secret."
            exit 1
          fi
          printf '{"BREEZ_API_KEY":"%s"}\n' "$BREEZ_API_KEY" > config.json

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --dart-define-from-file=config.json

      - uses: actions/upload-artifact@v4
        with:
          name: SATRAWALLET-APK
          path: build/app/outputs/flutter-apk/app-release.apk
